<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Quick Copy</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: system-ui, sans-serif; }
    .copy-btn {
      transition: all 0.2s;
    }
    .copy-btn:active {
      transform: scale(0.95);
    }
  </style>
</head>
<body class="bg-gray-900 text-white min-h-screen flex items-center justify-center">
  <div class="max-w-lg w-full p-8">
    <h1 class="text-3xl font-bold text-center mb-10">Quick Copy</h1>
    
    <div class="space-y-8">
      
      <!-- Button 1 -->
      <div class="bg-gray-800 rounded-xl p-6">
        <h2 class="text-lg font-semibold mb-3">1. WiFi Password</h2>
        <button onclick="copyText(1)" 
                class="copy-btn w-full bg-blue-600 hover:bg-blue-700 py-4 rounded-lg font-medium text-lg">
          Copy First Text
        </button>
      </div>

      <!-- Button 2 -->
      <div class="bg-gray-800 rounded-xl p-6">
        <h2 class="text-lg font-semibold mb-3">2. Login Code</h2>
        <button onclick="copyText(2)" 
                class="copy-btn w-full bg-green-600 hover:bg-green-700 py-4 rounded-lg font-medium text-lg">
          Copy Second Text
        </button>
      </div>

      <!-- Button 3 -->
      <div class="bg-gray-800 rounded-xl p-6">
        <h2 class="text-lg font-semibold mb-3">3. Other Info</h2>
        <button onclick="copyText(3)" 
                class="copy-btn w-full bg-purple-600 hover:bg-purple-700 py-4 rounded-lg font-medium text-lg">
          Copy Third Text
        </button>
      </div>

    </div>

    <p class="text-center text-gray-500 text-sm mt-10">
      Just edit the text in the JavaScript section below
    </p>
  </div>

  <script>
    // ==================== text ====================
    const texts = {
      1: "Put your first text here. Can be password, code, link, etc.",
      
      2: "Put your second text here. Can be multiple lines too.",
      
      3: "Put your third text here."
    };
    // ================================================================

    function copyText(id) {
      const text = texts[id];
      
      navigator.clipboard.writeText(text).then(() => {
        const btn = event.target;
        const originalText = btn.textContent;
        
        btn.textContent = "✅ Copied!";
        btn.style.backgroundColor = "#10b981";
        
        setTimeout(() => {
          btn.textContent = originalText;
          btn.style.backgroundColor = "";
        }, 2000);
      });
    }
  </script>
</body>
</html>
